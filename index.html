        .q-text { font-size: 1.25rem; font-weight: bold; margin: 15px 0; min-height: 3.5rem; }
        #feedback-area { height: 150px; margin-bottom: 15px; }
        #pika-img { max-height: 100%; border-radius: 10px; display: none; }
        .options-grid { display: grid; gap: 10px; }
        .opt-btn { padding: 12px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 1rem; }
        .correct { background: #d4edda !important; border-color: var(--green) !important; }
        .wrong { background: #f8d7da !important; border-color: var(--accent) !important; }

        /* 錯題本 */
        #result-screen { display: none; padding: 20px; text-align: center; }
        .mistake-list { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .mistake-item { border-bottom: 1px dashed #ccc; padding: 10px 0; font-size: 0.9rem; }
        .text-red { color: var(--accent); font-weight: bold; }
        .text-green { color: var(--green); font-weight: bold; }

</head>

{ c: "出師表", q: "諸葛亮認為後主應「諮諏善道」，「諮諏」指？", a: "詢問/商量", w: ["責備", "拒絕", "命令"] },
{ c: "出師表", q: "「宜付有司」中的「有司」指？", a: "官員/主管部門", w: ["司機", "公司", "家屬"] },
{ c: "出師表", q: "「攘除奸凶」中的「奸凶」指？", a: "曹魏政權", w: ["小偷", "天氣", "叛軍"] },
{ c: "出師表", q: "「察納雅言」中的「雅言」指？", a: "正確、正直的言論", w: ["優雅的話", "普通話", "謊言"] },
{ c: "出師表", q: "諸葛亮在文中對自己的定位是？", a: "輔政老臣/忠臣", w: ["掌權者", "老師", "敵人"] },
{ c: "出師表", q: "全文的情感基調是？", a: "忠貞、感人、沈痛", w: ["歡快", "憤怒", "諷刺"] },
];

let state = { quiz: [], curr: 0, score: 0, hp: 100, mistakes: [] };

// 初始化選單
function initMenu() {
    const chapters = [...new Set(rawBank.map(item => item.c))];
    const menu = document.getElementById('chapter-menu');
    chapters.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.innerText = c;
        btn.onclick = () => startGame(c);
        menu.appendChild(btn);
    });
}

function startGame(filter) {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    
    let filtered = (filter === 'ALL') ? [...rawBank] : rawBank.filter(i => i.c === filter);
    state.quiz = shuffle(filtered);
    render();
}

function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function render() {
    if (state.hp <= 0 || state.curr >= state.quiz.length) return finish();

    const d = state.quiz[state.curr];
    document.getElementById('pika-img').style.display = 'none';
    document.getElementById('q-cat').innerText = `【${d.c}】 ${state.curr + 1} / ${state.quiz.length}`;
    document.getElementById('q-body').innerText = d.q;

    let os = shuffle([{ t: d.a, c: true }, ...d.w.map(x => ({ t: x, c: false }))]);
    const container = document.getElementById('q-opts');
    container.innerHTML = '';
    os.forEach(o => {
        const b = document.createElement('button');
        b.className = 'opt-btn';
        b.innerText = o.t;
        b.onclick = () => check(o.c, b, d, o.t);
        container.appendChild(b);
    });
}

function check(isC, btn, data, userChoice) {
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    const pika = document.getElementById('pika-img');
    pika.style.display = 'block';

    if (isC) {
        state.score += 100;
        btn.classList.add('correct');
        pika.src = imgCorrect;
    } else {
        state.hp -= 20;
        btn.classList.add('wrong');
        pika.src = imgWrong;
        // 紀錄錯題
        state.mistakes.push({ q: data.q, my: userChoice, correct: data.a });
    }

    updateUI();
    setTimeout(() => { state.curr++; render(); }, 1300);
}

function updateUI() {
    document.getElementById('score').innerText = state.score;
    document.getElementById('hp-text').innerText = state.hp;
    document.getElementById('hp-fill').style.width = state.hp + '%';
}

function finish() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('res-score').innerText = state.score;

    if (state.mistakes.length > 0) {
        document.getElementById('mistake-container').style.display = 'block';
        const list = document.getElementById('mistake-list');
        list.innerHTML = state.mistakes.map(m => `
            <div class="mistake-item">
                <b>問：</b>${m.q}<br>
                <b>你的答案：</b><span class="text-red">${m.my}</span><br>
                <b>正確答案：</b><span class="text-green">${m.correct}</span>
            </div>
        `).join('');
    }
}

initMenu();
</script>
